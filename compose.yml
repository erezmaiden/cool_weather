services:
  db:
    image: postgres:14.23-trixie
    networks:
      - app_net
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      retries: 10
      interval: 5s
      timeout: 10s
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - app_net
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      HOST: ${HOST}
      PORT: ${PORT}
    command: python app.py
    depends_on:
      db:
        condition: service_healthy
networks:
  app_net:
volumes:
  db_data:
